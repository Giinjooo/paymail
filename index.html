<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PayMail</title>

<link rel="manifest" href="manifest.json"/>

<script>
const manifestData={
  name:"PayMail",
  short_name:"PayMail",
  start_url:".",
  display:"standalone"
};

const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});

document.addEventListener('DOMContentLoaded',()=>{
  const el=document.querySelector('link[rel="manifest"]');
  if(el) el.href=URL.createObjectURL(blob);
});
</script>

<style>
body{font-family:sans-serif;background:#0f0f1a;color:#fff;margin:0}
.page{display:none;padding:20px}
.page.active{display:block}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav-btn{flex:1;padding:10px;color:#aaa;background:none;border:none}
.nav-btn.active{color:#fff}
button{cursor:pointer}
</style>
</head>

<body>

<!-- SEND -->
<div class="page active" id="page-send">
  <h2>Send Email</h2>
  <input id="s-email" placeholder="Email"/>
  <button onclick="sendEmail()">Send</button>
</div>

<!-- MANAGE -->
<div class="page" id="page-manage">
  <h2>Templates</h2>
  <button onclick="addTemplate()">Add Template</button>
  <div id="manage-list"></div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <h2>History</h2>
  <div id="hist-list"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-send" onclick="showPage('send')">Send</button>
  <button class="nav-btn" id="nav-manage" onclick="showPage('manage')">Templates</button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')">History</button>
</div>

<script>
let templates=[];
let history=[];

/* ✅ FIXED FUNCTION */
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');

  if(name==='history') renderHistory();
  if(name==='manage') renderManageList();
}

/* BASIC FUNCTIONS */

function addTemplate(){
  const name=prompt("Template name?");
  if(!name) return;
  templates.push({id:Date.now(),name});
  renderManageList();
}

function renderManageList(){
  const el=document.getElementById('manage-list');
  el.innerHTML=templates.map(t=>`<div>${t.name}</div>`).join('');
}

function sendEmail(){
  const email=document.getElementById('s-email').value;
  if(!email) return alert("Enter email");

  history.unshift({email,date:new Date().toLocaleString()});
  renderHistory();

  alert("Fake send success");
}

function renderHistory(){
  const el=document.getElementById('hist-list');
  el.innerHTML=history.map(h=>`<div>${h.email} - ${h.date}</div>`).join('');
}
</script>

</body>
</html>
