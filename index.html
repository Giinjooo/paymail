const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
document.addEventListener('DOMContentLoaded',()=>{const el=document.querySelector('link[rel="manifest"]');if(el)el.href=URL.createObjectURL(blob);});
if('serviceWorker'in navigator){window.addEventListener('load',()=>{const sw=`const C='pm-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});});}
</script>

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  if(name==='manage')renderManageList();

}
