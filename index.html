<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="PayMail"/>
<meta name="description" content="Send payment confirmation emails after GCash payments"/>
<title>PayMail</title>
<link rel="manifest" href="manifest.json"/>
<script>
const manifestData={name:"PayMail",short_name:"PayMail",description:"GCash Email Automation",start_url:"./",display:"standalone",background_color:"#0f0f1a",theme_color:"#1a1a2e",orientation:"portrait",icons:[{src:"https://via.placeholder.com/192x192/7c6af7/ffffff?text=PM",sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:"https://via.placeholder.com/512x512/7c6af7/ffffff?text=PM",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
document.addEventListener('DOMContentLoaded',()=>{const el=document.querySelector('link[rel="manifest"]');if(el)el.href=URL.createObjectURL(blob);});
if('serviceWorker'in navigator){window.addEventListener('load',()=>{const sw=`const C='pm-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});});}
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#22223b;--accent:#7c6af7;--accent2:#a594f9;--accent-glow:rgba(124,106,247,0.25);--green:#4ade80;--green-dim:rgba(74,222,128,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--text:#f0efff;--muted:#7c7a9e;--border:rgba(255,255,255,0.07);--radius:16px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:70%;height:70%;background:radial-gradient(circle,rgba(124,106,247,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(74,222,128,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,26,0.9);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
.logo-sub{font-size:0.62rem;color:var(--muted);font-family:var(--mono);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,26,0.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 12px;border:none;background:transparent;font-family:var(--font);font-size:0.65rem;font-weight:600;color:var(--muted);cursor:pointer;letter-spacing:0.3px;text-transform:uppercase;transition:color 0.2s;}
.nav-btn.active{color:var(--accent2);}
.nav-icon{font-size:1.25rem;}
.page{display:none;padding:20px 16px 100px;position:relative;z-index:1;animation:fadeIn 0.25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;margin-bottom:14px;}
.card-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;}
.field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;font-family:var(--font);font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;appearance:none;-webkit-text-fill-color:var(--text);}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.template-grid{display:flex;flex-direction:column;gap:10px;}
.template-option{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;}
.template-option:active{transform:scale(0.98);}
.template-option.selected{border-color:var(--accent);background:rgba(124,106,247,0.1);box-shadow:0 0 0 3px var(--accent-glow);}
.t-icon{font-size:1.4rem;flex-shrink:0;}
.t-info{flex:1;min-width:0;}
.t-name{font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-preview{font-size:0.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:0.75rem;}
.template-option.selected .t-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:var(--font);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9b8cff);color:#fff;box-shadow:0 6px 24px var(--accent-glow);}
.btn-primary:active{transform:scale(0.97);}
.btn-primary:disabled{background:var(--surface2);color:var(--muted);box-shadow:none;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1.5px solid rgba(248,113,113,0.2);}
.btn-sm{width:auto;padding:7px 14px;font-size:0.78rem;border-radius:8px;}
.rte-toolbar{display:flex;flex-wrap:wrap;gap:5px;background:var(--surface2);border:1.5px solid var(--border);border-bottom:none;border-radius:11px 11px 0 0;padding:8px 10px;}
.rte-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.78rem;padding:5px 10px;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.rte-btn:active{background:var(--accent);color:#fff;}
.rte-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch;}
.rte-editor{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-top:none;border-radius:0 0 11px 11px;padding:12px 14px;font-family:var(--font);font-size:0.9rem;color:var(--text);outline:none;min-height:220px;max-height:55vh;overflow-y:auto;line-height:1.8;word-break:break-word;transition:border-color 0.2s;}
.rte-editor:focus{border-color:var(--accent);}
.rte-editor:empty:before{content:attr(placeholder);color:var(--muted);pointer-events:none;}
.rte-editor a{color:var(--accent2);word-break:break-all;}
.rte-editor ul,.rte-editor ol{padding-left:20px;}
.tmpl-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.ti-icon{font-size:1.5rem;flex-shrink:0;}
.ti-info{flex:1;min-width:0;}
.ti-name{font-weight:600;font-size:0.9rem;}
.ti-sub{font-size:0.72rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ti-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.icon-btn:active{transform:scale(0.92);}
.icon-btn.edit{background:rgba(124,106,247,0.12);color:var(--accent2);}
.icon-btn.del{background:var(--red-dim);color:var(--red);}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.hist-email{font-weight:600;font-size:0.88rem;margin-bottom:6px;}
.hist-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hist-template{font-size:0.72rem;color:var(--muted);}
.hist-date{font-size:0.68rem;color:var(--muted);font-family:var(--mono);}
.badge{font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:6px;}
.badge.sent{background:var(--green-dim);color:var(--green);}
.badge.failed{background:var(--red-dim);color:var(--red);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;padding:24px 18px 40px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:var(--surface2);border:none;color:var(--muted);font-size:1.1rem;width:32px;height:32px;border-radius:8px;cursor:pointer;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions .btn{flex:1;}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 20px;border-radius:30px;font-size:0.82rem;font-weight:600;opacity:0;pointer-events:none;transition:all 0.3s;z-index:300;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(74,222,128,0.4);color:var(--green);}
.toast.err{border-color:rgba(248,113,113,0.4);color:var(--red);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .e-icon{font-size:2.8rem;margin-bottom:12px;}
.empty p{font-size:0.85rem;line-height:1.6;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <div><div>PayMail</div><div class="logo-sub">D' Bookshelf</div></div>
  </div>
  <span style="font-size:0.68rem;color:var(--muted);font-family:var(--mono);">v3.0</span>
</div>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">New Template</span>
      <button class="modal-close" onclick="closeModalDirect()">x</button>
    </div>
    <div class="field"><label>Template Name</label><input type="text" id="m-name" placeholder="e.g. Take All Templates"/></div>
    <div class="field"><label>Icon (emoji)</label><input type="text" id="m-icon" placeholder="📦" maxlength="2"/></div>
    <div class="field"><label>Email Subject</label><input type="text" id="m-subject" placeholder="e.g. Your Templates are Ready!"/></div>
    <div class="field">
      <label>Email Body</label>
      <div class="rte-toolbar">
        <button type="button" class="rte-btn" onclick="fmt('bold')"><b>B</b></button>
        <button type="button" class="rte-btn" onclick="fmt('italic')"><i>I</i></button>
        <button type="button" class="rte-btn" onclick="fmt('underline')"><u>U</u></button>
        <span class="rte-sep"></span>
        <button type="button" class="rte-btn" onclick="fmt('insertUnorderedList')">• List</button>
        <button type="button" class="rte-btn" onclick="fmt('insertOrderedList')">1. List</button>
        <span class="rte-sep"></span>
        <button type="button" class="rte-btn" onclick="insertLink()">Link</button>
        <button type="button" class="rte-btn" onclick="fmt('removeFormat')">Clear</button>
      </div>
      <div id="m-body" class="rte-editor" contenteditable="true" placeholder="Type your email body here..."></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModalDirect()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTemplate()">Save Template</button>
    </div>
  </div>
</div>

<!-- SEND PAGE -->
<div class="page active" id="page-send">
  <div class="card">
    <div class="card-title">Customer Email</div>
    <div class="field" style="margin:0"><input type="email" id="s-email" placeholder="customer@email.com" autocomplete="email"/></div>
  </div>
  <div class="card">
    <div class="card-title">Choose Template</div>
    <div class="template-grid" id="template-grid"></div>
    <div id="no-templates" class="empty" style="padding:24px 0 8px;display:none;"><div class="e-icon">📭</div><p>No templates yet.<br>Go to <strong>Templates</strong> tab.</p></div>
  </div>
  <button class="btn btn-primary" id="send-btn" onclick="sendEmail()"><span>📨</span> Send Email</button>
</div>

<!-- MANAGE PAGE -->
<div class="page" id="page-manage">
  <button class="btn btn-primary" style="margin-bottom:14px;" onclick="openModal()"><span>+</span> New Template</button>
  <div id="manage-list"></div>
</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <span style="font-size:0.78rem;color:var(--muted);font-weight:600;" id="hist-count">0 sent</span>
    <button class="btn btn-danger btn-sm" onclick="clearHistory()">Clear All</button>
  </div>
  <div id="hist-list"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-send" onclick="showPage('send')"><span class="nav-icon">📨</span>Send</button>
  <button class="nav-btn" id="nav-manage" onclick="showPage('manage')"><span class="nav-icon">📄</span>Templates</button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')"><span class="nav-icon">🕓</span>History</button>
</div>

<script>
const WORKER_URL='https://paymail-sender.jason-giinjo.workers.dev';
const WORKER_SECRET='Aceease123@#';
let templates=[],history=[],editingId=null,selectedTemplateId=null;

function init(){
  templates=JSON.parse(localStorage.getItem('pm_templates')||'[]');
  history=JSON.parse(localStorage.getItem('pm_history')||'[]');
  renderTemplateGrid();renderManageList();renderHistory();
}

SelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history')renderHistory();
  if(name==='manage')renderManageList();
  if(name==='send')renderTemplateGrid();
}

function fmt(cmd){document.getElementById('m-body').focus();document.execCommand(cmd,false,null);}
function insertLink(){const u=prompt('Enter URL:');if(u){document.getElementById('m-body').focus();document.execCommand('createLink',false,u);}}

function renderTemplateGrid(){
  const grid=document.getElementById('template-grid');
  const noT=document.getElementById('no-templates');
  if(!templates.length){grid.innerHTML='';noT.style.display='block';return;}
  noT.style.display='none';
  grid.innerHTML=templates.map(t=>`
    <div class="template-option ${selectedTemplateId===t.id?'selected':''}" onclick="selectTemplate('${t.id}')">
      <span class="t-icon">${t.icon||'📦'}</span>
      <div class="t-info"><div class="t-name">${esc(t.name)}</div><div class="t-preview">${esc(t.subject)}</div></div>
      <div class="t-check">${selectedTemplateId===t.id?'✓':''}</div>
    </div>`).join('');
}

function selectTemplate(id){selectedTemplateId=id;renderTemplateGrid();}

async function sendEmail(){
  const email=document.getElementById('s-email').value.trim();
  if(!email){showToast('Enter a customer email','err');return;}
  if(!selectedTemplateId){showToast('Select a template first','err');return;}
  const tmpl=templates.find(t=>t.id===selectedTemplateId);
  if(!tmpl){showToast('Template not found','err');return;}
  const btn=document.getElementById('send-btn');
  btn.innerHTML='<span class="spinner"></span> Sending...';
  btn.disabled=true;
  try{
    // Convert HTML to plain text for fallback
    const tmp = document.createElement('div');
    tmp.innerHTML = tmpl.body || '';
    const plainText = tmp.innerText || tmp.textContent || '';

    const formData = new URLSearchParams();
    formData.append('data', JSON.stringify({
      to: email,
      subject: tmpl.subject,
      htmlBody: tmpl.body,
      plainText: plainText,
      secret: WORKER_SECRET
    }));

    const res=await fetch(WORKER_URL,{
      method:'POST',
      body: formData
    });
    const data=await res.json();
    if(data.success){
      addHistory(email,tmpl.name,'sent');
      showToast('Sent to '+email,'ok');
      document.getElementById('s-email').value='';
      selectedTemplateId=null;
      renderTemplateGrid();
    }else{
      addHistory(email,tmpl.name,'failed');
      showToast('Failed: '+(data.error||'Unknown error'),'err');
    }
  }catch(e){
    addHistory(email,tmpl.name,'failed');
    showToast('Network error. Check connection.','err');
  }
  btn.innerHTML='<span>📨</span> Send Email';
  btn.disabled=false;
}

function renderManageList(){
  const el=document.getElementById('manage-list');
  if(!templates.length){el.innerHTML='<div class="empty"><div class="e-icon">📭</div><p>No templates yet.</p></div>';return;}
  el.innerHTML=templates.map(t=>`
    <div class="tmpl-item">
      <span class="ti-icon">${t.icon||'📦'}</span>
      <div class="ti-info"><div class="ti-name">${esc(t.name)}</div><div class="ti-sub">${esc(t.subject)}</div></div>
      <div class="ti-actions">
        <button class="icon-btn edit" onclick="openModal('${t.id}')">✏️</button>
        <button class="icon-btn del" onclick="deleteTemplate('${t.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function openModal(id=null){
  editingId=id;
  document.getElementById('modal-title-text').textContent=id?'Edit Template':'New Template';
  if(id){
    const t=templates.find(t=>t.id===id);
    document.getElementById('m-name').value=t.name;
    document.getElementById('m-icon').value=t.icon||'📦';
    document.getElementById('m-subject').value=t.subject;
    document.getElementById('m-body').innerHTML=t.body||'';
  }else{
    document.getElementById('m-name').value='';
    document.getElementById('m-icon').value='📦';
    document.getElementById('m-subject').value='';
    document.getElementById('m-body').innerHTML='';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}

function saveTemplate(){
  const name=document.getElementById('m-name').value.trim();
  const icon=document.getElementById('m-icon').value.trim()||'📦';
  const subject=document.getElementById('m-subject').value.trim();
  const body=document.getElementById('m-body').innerHTML.trim();
  if(!name||!subject||!body){showToast('Fill in all fields','err');return;}
  if(editingId){
    const i=templates.findIndex(t=>t.id===editingId);
    templates[i]={...templates[i],name,icon,subject,body};
    showToast('Template updated','ok');
  }else{
    templates.push({id:'tmpl_'+Date.now(),name,icon,subject,body});
    showToast('Template created','ok');
  }
  save('pm_templates',templates);
  closeModalDirect();
  renderManageList();
  renderTemplateGrid();
}

function deleteTemplate(id){
  if(!confirm('Delete this template?'))return;
  templates=templates.filter(t=>t.id!==id);
  if(selectedTemplateId===id)selectedTemplateId=null;
  save('pm_templates',templates);
  renderManageList();renderTemplateGrid();
  showToast('Deleted','');
}

function addHistory(email,templateName,status){
  history.unshift({email,templateName,status,date:new Date().toISOString()});
  save('pm_history',history);
}

function renderHistory(){
  const el=document.getElementById('hist-list');
  const ct=document.getElementById('hist-count');
  ct.textContent=history.length+' email'+(history.length!==1?'s':'')+' sent';
  if(!history.length){el.innerHTML='<div class="empty"><div class="e-icon">📭</div><p>No history yet.</p></div>';return;}
  el.innerHTML=history.map(h=>{
    const d=new Date(h.date);
    const ds=d.toLocaleDateString('en-PH',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
    return`<div class="hist-item"><div class="hist-email">${esc(h.email)}</div><div class="hist-meta"><span class="badge ${h.status}">${h.status==='sent'?'Sent':'Failed'}</span><span class="hist-template">${esc(h.templateName)}</span><span class="hist-date">${ds}</span></div></div>`;
  }).join('');
}

function clearHistory(){
  if(!history.length)return;
  if(!confirm('Clear all history?'))return;
  history=[];save('pm_history',history);renderHistory();
}

function save(key,val){localStorage.setItem(key,JSON.stringify(val));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',3200);
}
